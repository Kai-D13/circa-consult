<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <title>Circa – Trạng thái dữ liệu tư vấn</title>
  <style>
    body{font-family:Arial,sans-serif;max-width:760px;margin:36px auto;padding:0 20px;color:#1f2937;background:#f7f7f8}h1{font-size:22px;color:#c86615}.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.04)}dl{display:grid;grid-template-columns:170px 1fr;gap:10px;margin:0}dt{color:#667085}dd{margin:0;font-weight:600}button{margin-top:18px;padding:10px 16px;border:0;border-radius:7px;background:#f27b21;color:#fff;cursor:pointer;font-weight:700}button:disabled{opacity:.5}.ok{color:#067647}.error{color:#b42318}.hint{color:#667085;font-size:13px;line-height:1.5}
  </style>
</head>
<body>
  <h1>💊 Dữ liệu tư vấn bán kèm</h1>
  <p class="hint">Dataset được Admin quản lý tập trung. Máy POS tự đồng bộ khi Chrome khởi động, khi mở trang bán hàng và định kỳ khoảng mỗi 15 phút.</p>
  <section class="card">
    <dl id="status"><dt>Trạng thái</dt><dd>Đang tải…</dd></dl>
    <button id="sync">Đồng bộ ngay</button>
  </section>
  <script src="options.js"></script>
</body>
</html>
