<!doctype html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Circa - Trạng thái dữ liệu chương trình</title><style>
:root{--orange:#f4743b;--ink:#243238;--muted:#667085;--line:#e4e7ec;--bg:#f6f7f8}*{box-sizing:border-box}body{font-family:Arial,sans-serif;max-width:980px;margin:32px auto;padding:0 20px;color:var(--ink);background:var(--bg)}h1{margin:0 0 8px;color:#c85420;font-size:24px}.hint{color:var(--muted);font-size:13px;line-height:1.5}.card{margin-top:16px;padding:18px;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 2px 8px rgba(16,24,40,.04)}dl{display:grid;grid-template-columns:180px 1fr;gap:9px;margin:0}dt{color:var(--muted)}dd{margin:0;font-weight:700}.ok{color:#067647}.error{color:#b42318}button{margin-top:16px;padding:10px 16px;border:0;border-radius:7px;background:var(--orange);color:#fff;cursor:pointer;font-weight:700}button:disabled{opacity:.5}.program{margin-top:12px;border:1px solid var(--line);border-radius:9px;overflow:hidden}.program summary{display:flex;align-items:center;gap:9px;padding:12px;cursor:pointer;background:#fffaf7;font-weight:700}.type{padding:3px 7px;border-radius:999px;background:#fff1e8;color:#c2410c;font-size:10px;text-transform:uppercase}.status{margin-left:auto;color:#067647;font-size:11px}.status.expired{color:#b42318}.status.scheduled{color:#b54708}.program-body{padding:13px}.program-body dl{grid-template-columns:150px 1fr;font-size:12px}.rules{margin-top:12px;overflow:auto;max-height:280px;border:1px solid var(--line);border-radius:7px}table{width:100%;border-collapse:collapse;font-size:11px}th,td{padding:8px;text-align:left;border-bottom:1px solid var(--line);vertical-align:top}th{position:sticky;top:0;background:#f9fafb}.empty{padding:18px;text-align:center;color:var(--muted)}@media(max-width:640px){dl,.program-body dl{grid-template-columns:1fr}dt{margin-top:5px}}
</style></head><body><h1>✨ Dữ liệu chương trình tại POS</h1><p class="hint">Extension tự đồng bộ khi Chrome khởi động, khi mở POS và định kỳ khoảng 15 phút. Mỗi chương trình có version độc lập và tự ngừng hiển thị khi hết hạn.</p><section class="card"><dl id="status"><dt>Trạng thái</dt><dd>Đang tải…</dd></dl><button id="sync">Đồng bộ ngay</button></section><section class="card"><h2>Chương trình đã đồng bộ</h2><div id="programs" class="empty">Đang tải…</div></section><script src="core.js"></script><script src="options.js"></script></body></html>
